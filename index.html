<style>
  * { box-sizing: border-box; }

    background: #f4ede6;
    color: #4a3524;
    margin: 0;
    padding: 48px 20px;
    line-height: 1.8;
  }
  .wrap { max-width: 900px; margin: 0 auto; }
  header {
    text-align: center;

    padding-bottom: 32px;

  }

  .subtitle {

  }
  h2 {

    color: #4a3524;
    margin: 48px 0 20px;
    padding-left: 14px;
    border-left: 4px solid #c6a16e;
  }
  .meeting-card {
    background: #fbf7f2;
    border: 1px solid rgba(198,161,110,0.25);
    border-radius: 10px;
    padding: 24px 28px;
    margin-bottom: 20px;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  }
  .meeting-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(74,53,36,0.08);
    border-color: #c6a16e;
  }
  a.card-link {
    display: block;
    text-decoration: none;
    color: inherit;
  }
  .meeting-date {
    display: inline-block;
    background: linear-gradient(135deg, #c6a16e, #b8916a);
    color: #fff8f0;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .meeting-title {
    font-size: 1.2rem;
    font-weight: 700;
    margin: 0 0 10px;
    color: #4a3524;
  }
  .meeting-desc {
    color: #7a5a47;
    font-size: 0.95rem;
    margin: 0 0 16px;
  }
  .link-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    background: #fff8f0;
    color: #b8916a;
    border: 1px solid rgba(198,161,110,0.45);
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 600;
    transition: background 0.2s, color 0.2s;
  }
  .link-btn:hover {
    background: linear-gradient(135deg, #c6a16e, #b8916a);
    color: #fff8f0;
  }
  .link-btn.primary {
    background: linear-gradient(135deg, #c6a16e, #b8916a);
    color: #fff8f0;
    border-color: transparent;
  }
  .link-btn.primary:hover {
    background: #b8916a;
  }
  .section-intro {
    color: #7a5a47;
    font-size: 0.95rem;
    margin-bottom: 24px;
    padding: 16px 20px;
    background: rgba(198,161,110,0.08);
    border-radius: 8px;
    border-left: 3px solid #c6a16e;
  }
  footer {
    margin-top: 72px;
    padding-top: 28px;
    border-top: 1px solid rgba(198,161,110,0.25);
    text-align: center;
    color: #a89878;
    font-size: 0.85rem;
  }
  footer a {
    color: #b8916a;
    text-decoration: none;
  }
  footer a:hover { text-decoration: underline; }
